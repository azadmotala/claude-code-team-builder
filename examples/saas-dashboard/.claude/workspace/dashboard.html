<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1724; color: #e2e8f0; padding: 24px; min-height: 100vh; }

  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .header h1 { font-size: 24px; font-weight: 700; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-executing { background: #2563eb; color: #fff; }
  .badge-complete { background: #16a34a; color: #fff; }
  .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-full { grid-column: 1 / -1; }

  .card { background: #1a2332; border: 1px solid #2a3a4e; border-radius: 10px; padding: 20px; }
  .card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 14px; }

  /* Counts */
  .counts { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
  .count-item { font-size: 13px; font-weight: 600; }
  .count-done { color: #22c55e; }
  .count-progress { color: #3b82f6; }
  .count-pending { color: #eab308; }
  .count-blocked { color: #6b7280; }
  .count-failed { color: #ef4444; }

  /* Progress */
  .progress-pct { font-size: 48px; font-weight: 800; line-height: 1; margin-bottom: 10px; }
  .progress-bar-bg { width: 100%; height: 8px; background: #2a3a4e; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; background: #3b82f6; border-radius: 4px; transition: width 0.4s ease; }
  .progress-label { font-size: 13px; color: #94a3b8; }

  /* Milestones */
  .milestone { margin-bottom: 16px; }
  .milestone:last-child { margin-bottom: 0; }
  .milestone-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .milestone-name { font-size: 14px; font-weight: 600; }
  .milestone-pct { font-size: 13px; color: #94a3b8; }
  .milestone-bar-bg { width: 100%; height: 6px; background: #2a3a4e; border-radius: 3px; overflow: hidden; }
  .milestone-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .milestone-bar-fill-done { background: #22c55e; }
  .milestone-bar-fill-partial { background: #3b82f6; }
  .milestone-bar-fill-zero { background: #2a3a4e; }

  /* Tasks */
  .task { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #2a3a4e; }
  .task:last-child { border-bottom: none; }
  .task-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; margin-top: 2px; }
  .task-badge-done { background: #16a34a; color: #fff; }
  .task-badge-in_progress { background: #2563eb; color: #fff; }
  .task-badge-pending { background: #854d0e; color: #fef08a; }
  .task-badge-blocked { background: #374151; color: #9ca3af; }
  .task-badge-failed { background: #991b1b; color: #fca5a5; }
  .task-badge-review { background: #7c3aed; color: #e9d5ff; }
  .task-info { flex: 1; }
  .task-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .task-meta { font-size: 12px; color: #64748b; }

  /* Timeline */
  .timeline-entry { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #1e2d3d; }
  .timeline-entry:last-child { border-bottom: none; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .timeline-dot-done { background: #22c55e; }
  .timeline-dot-fail { background: #ef4444; }
  .timeline-dot-info { background: #3b82f6; }
  .timeline-text { color: #cbd5e1; }
  .timeline-empty { color: #475569; font-style: italic; font-size: 13px; }

  .footer { text-align: center; padding: 20px 0 8px; font-size: 12px; color: #475569; }

  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1 id="project-name">Project Dashboard</h1>
  <span class="badge badge-executing" id="status-badge">LOADING</span>
</div>
<div class="subtitle" id="subtitle">Loading...</div>

<div class="grid">
  <!-- Overall Progress -->
  <div class="card grid-full">
    <div class="card-label">Overall Progress</div>
    <div class="counts" id="counts"></div>
    <div class="progress-pct" id="progress-pct">0%</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 of 0 tasks complete</div>
  </div>

  <!-- Milestones -->
  <div class="card">
    <div class="card-label">Milestones</div>
    <div id="milestones"></div>
  </div>

  <!-- Tasks -->
  <div class="card">
    <div class="card-label">Tasks</div>
    <div id="tasks"></div>
  </div>

  <!-- Activity Timeline -->
  <div class="card grid-full">
    <div class="card-label">Activity Timeline</div>
    <div id="timeline"></div>
  </div>
</div>

<div class="footer" id="footer">Dashboard · Loading...</div>

<script>
const REFRESH_MS = 5000;

function getStatusClass(status) {
  const s = (status || '').toLowerCase().replace(/\s+/g, '_');
  if (s === 'done' || s === 'complete') return 'done';
  if (s === 'in_progress' || s === 'in-progress' || s === 'executing') return 'in_progress';
  if (s === 'pending' || s === 'ready') return 'pending';
  if (s === 'blocked') return 'blocked';
  if (s === 'failed' || s === 'error') return 'failed';
  if (s === 'review') return 'review';
  return 'pending';
}

function getStatusLabel(status) {
  const map = { done: 'DONE', in_progress: 'IN PROGRESS', pending: 'PENDING', blocked: 'BLOCKED', failed: 'FAILED', review: 'REVIEW' };
  return map[getStatusClass(status)] || status.toUpperCase();
}

async function loadJSON(path) {
  try {
    const r = await fetch(path + '?t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function loadText(path) {
  try {
    const r = await fetch(path + '?t=' + Date.now());
    if (!r.ok) return '';
    return await r.text();
  } catch { return ''; }
}

function groupByMilestone(tasks) {
  const milestones = {};
  for (const t of tasks) {
    const mid = t.milestone || t.id?.split('-')[0] || 'unknown';
    if (!milestones[mid]) milestones[mid] = { id: mid, title: t.milestone_title || mid, tasks: [] };
    milestones[mid].tasks.push(t);
    if (t.milestone_title) milestones[mid].title = t.milestone_title;
  }
  return Object.values(milestones);
}

function parseProgressLog(text) {
  if (!text.trim()) return [];
  return text.trim().split('\n').filter(l => l.trim()).slice(-20).reverse();
}

function getTimelineDotClass(line) {
  const l = line.toLowerCase();
  if (l.includes('fail') || l.includes('error') || l.includes('🔴')) return 'fail';
  if (l.includes('done') || l.includes('✅') || l.includes('complete') || l.includes('pass')) return 'done';
  return 'info';
}

async function refresh() {
  // Try multiple possible paths for tasks.json
  let data = await loadJSON('tasks.json');
  if (!data) data = await loadJSON('../tasks.json');
  if (!data) data = await loadJSON('.claude/tasks.json');

  const logText = await loadText('progress.log');

  if (!data) {
    document.getElementById('subtitle').textContent = 'Waiting for tasks.json...';
    return;
  }

  // Normalize: handle both array and object formats
  let tasks = [];
  const projectName = data.project || data.project_name || 'Project Dashboard';

  if (Array.isArray(data)) {
    tasks = data;
  } else if (data.tasks && Array.isArray(data.tasks)) {
    tasks = data.tasks;
  } else if (data.milestones && Array.isArray(data.milestones)) {
    for (const m of data.milestones) {
      if (m.tasks) {
        for (const t of m.tasks) {
          t.milestone = m.id || m.name;
          t.milestone_title = m.title || m.name || m.id;
          tasks.push(t);
        }
      }
    }
  }

  // Counts
  const counts = { done: 0, in_progress: 0, pending: 0, blocked: 0, failed: 0 };
  for (const t of tasks) {
    const s = getStatusClass(t.status);
    if (counts[s] !== undefined) counts[s]++;
    else counts.pending++;
  }
  const total = tasks.length;
  const pct = total > 0 ? Math.round((counts.done / total) * 100) : 0;
  const allDone = total > 0 && counts.done === total;

  // Header
  document.getElementById('project-name').textContent = projectName;
  const badge = document.getElementById('status-badge');
  badge.textContent = allDone ? 'COMPLETE' : 'EXECUTING';
  badge.className = 'badge ' + (allDone ? 'badge-complete' : 'badge-executing');

  const now = new Date().toISOString().slice(0, 10);
  document.getElementById('subtitle').textContent = 'Last updated: ' + now + '  ·  Auto-refreshes every 5 seconds';

  // Counts bar
  const countsEl = document.getElementById('counts');
  countsEl.innerHTML =
    '<span class="count-item count-done">✓ Done: ' + counts.done + '</span>' +
    '<span class="count-item count-progress">◆ In Progress: ' + counts.in_progress + '</span>' +
    '<span class="count-item count-pending">○ Pending: ' + counts.pending + '</span>' +
    (counts.blocked > 0 ? '<span class="count-item count-blocked">▪ Blocked: ' + counts.blocked + '</span>' : '') +
    (counts.failed > 0 ? '<span class="count-item count-failed">✗ Failed: ' + counts.failed + '</span>' : '');

  // Progress
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = counts.done + ' of ' + total + ' tasks complete';

  // Milestones
  const milestones = groupByMilestone(tasks);
  const milestonesEl = document.getElementById('milestones');
  milestonesEl.innerHTML = milestones.map(m => {
    const mTotal = m.tasks.length;
    const mDone = m.tasks.filter(t => getStatusClass(t.status) === 'done').length;
    const mPct = mTotal > 0 ? Math.round((mDone / mTotal) * 100) : 0;
    const fillClass = mPct === 100 ? 'milestone-bar-fill-done' : mPct > 0 ? 'milestone-bar-fill-partial' : 'milestone-bar-fill-zero';
    return '<div class="milestone">' +
      '<div class="milestone-row"><span class="milestone-name">' + (m.title || m.id) + '</span><span class="milestone-pct">' + mPct + '%</span></div>' +
      '<div class="milestone-bar-bg"><div class="milestone-bar-fill ' + fillClass + '" style="width:' + mPct + '%"></div></div>' +
      '</div>';
  }).join('');

  // Tasks
  const tasksEl = document.getElementById('tasks');
  tasksEl.innerHTML = tasks.map(t => {
    const sc = getStatusClass(t.status);
    return '<div class="task">' +
      '<span class="task-badge task-badge-' + sc + '">' + getStatusLabel(t.status) + '</span>' +
      '<div class="task-info"><div class="task-name">' + (t.name || t.title || t.id) + '</div>' +
      '<div class="task-meta">' + (t.agent || '') + (t.id ? ' · ' + t.id : '') + '</div></div></div>';
  }).join('');

  // Timeline
  const timelineEl = document.getElementById('timeline');
  const entries = parseProgressLog(logText);
  if (entries.length === 0) {
    timelineEl.innerHTML = '<div class="timeline-empty">No activity yet</div>';
  } else {
    timelineEl.innerHTML = entries.map(line => {
      const dotClass = getTimelineDotClass(line);
      return '<div class="timeline-entry"><span class="timeline-dot timeline-dot-' + dotClass + '"></span><span class="timeline-text">' + line + '</span></div>';
    }).join('');
  }

  // Footer
  document.getElementById('footer').textContent = projectName + ' Dashboard · Generated ' + now;
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
